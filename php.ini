; PHP Configuration for Symfony

; Extension directory
extension_dir = "C:\xampp\php\ext"

; Extensions
extension=pdo
extension=pdo_mysql
extension=pdo_sqlite
extension=openssl
extension=curl
extension=mbstring
extension=fileinfo
extension=gd

; Error reporting
display_errors = On
error_reporting = E_ALL

; Memory and execution
memory_limit = 512M
max_execution_time = 300

; File uploads
upload_max_filesize = 64M
post_max_size = 64M

; Date and time
date.timezone = "Asia/Manila"

; Session
session.auto_start = 0
