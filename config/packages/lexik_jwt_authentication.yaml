lexik_jwt_authentication:
    secret_key: '%env(resolve:JWT_SECRET_KEY)%'
    public_key: '%env(resolve:JWT_PUBLIC_KEY)%'
    pass_phrase: '%env(JWT_PASSPHRASE)%'
    # Must match security.providers.app_user_provider.entity.property (email).
    # Default "username" puts the User.username field in the JWT while the provider
    # loads by email, so tokens fail with "Invalid credentials." whenever those differ.
    user_id_claim: email
    # Mobile app sessions — default Lexik TTL is 3600s (1 hour).
    token_ttl: '%env(int:JWT_TOKEN_TTL)%'
